services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: crawler
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - MONGO_URI=mongodb://crawler-mongo:27017/scholarshipdb
    networks:
      - scholarship-net

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: aggregator
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - MONGO_URI=mongodb://crawler-mongo:27017/scholarshipdb
    command: ["python", "crawler/aggregator.py"]
    networks:
      - scholarship-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: worker
    shm_size: '4gb'
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - MONGO_URI=mongodb://crawler-mongo:27017/scholarship_crawler
#    command: ["python", "crawler/worker.py"]
    command: ["python", "crawler/test_worker.py"]
    networks:
      - scholarship-net

  mongo:
    image: mongo:latest
    container_name: crawler-mongo
    ports:
      - "27017:27017"
    networks:
      - scholarship-net

  redis:
    image: redis:latest
    container_name: crawler-redis
    ports:
      - "6379:6379"
    networks:
      - scholarship-net

networks:
  scholarship-net:
    driver: bridge
    name: scholarship-net