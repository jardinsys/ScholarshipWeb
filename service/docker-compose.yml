services:
  frontend:
    build:
      context: ..
      dockerfile: service/Dockerfile.frontend
    container_name: scholarship-frontend
    ports:
      - "5173:5173"
    networks:
      - scholarship-net

  api:
    build:
      context: ..
      dockerfile: service/Dockerfile.api
    container_name: scholarship-api
    ports:
      - "3001:3001"
    environment:
      # 'mongo' is the container name from pipeline/docker-compose.yml,
      # reachable via the shared scholarship-net network
      - MONGO_URI=mongodb://mongo:27017/scholarshipdb
      - PORT=3001
    networks:
      - scholarship-net

networks:
  scholarship-net:
    external: true
    name: scholarship-net